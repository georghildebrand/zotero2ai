version: "3.8"

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: zotero-open-webui
    # If running on Synology via Synology Container Manager, you can map these paths
    volumes:
      - ./data:/app/backend/data
      # MOUNT THE SYNC FOLDER SO THE TOOLS CAN WRITE JOBS TO IT
      # E.g. point this to your mapped Syncthing / Synology Drive folder on the NAS filesystem
      - ${HOME}/ZoteroQueue:/app/backend/data/zotero_queue_sync
      # MOUNT THE READ CACHE SYNC FOLDER FOR BETTER BIBTEX JSON EXPORTS
      - ${HOME}/ZoteroQueue/ZoteroReadCache:/app/backend/data/zotero_read_cache
    ports:
      - "3000:8080"
    environment:
      - "OPENAI_API_BASE_URL=https://openrouter.ai/api/v1"
      - "OPENAI_API_KEY=${OPENROUTER_API_KEY}"
      - "WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-zdocker}"
    restart: always
